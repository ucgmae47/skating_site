<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Athens Skating Club{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="/static/logo.jpg" type="image/jpeg">
</head>
<body>
    <header>
        <nav>
	    <div class="left-links">
                <a href="{{ url_for('home') }}">Home</a>
                <a href="{{ url_for('schedule') }}">Schedule</a>
    	        <a href="{{ url_for('officers') }}">Officers</a>
	    </div>
	    <div class="right-links">
	        {% if session.get('user_id') %}
	            <span>Welcome, {{ session.get('first_name') }}!</span>
	            <a href="{{ url_for('logout') }}">Logout</a>
	        {% else %}
	            <a href="{{ url_for('signup') }}">Sign Up</a>
	            <a href="{{ url_for('login') }}">Login</a>
	        {% endif %}
	    </div>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
