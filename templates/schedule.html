{% extends "layout.html" %}

{% block title %}Schedule - Athens Skating Club{% endblock %}

{% block content %}
    <h2>Upcoming Events</h2>
    <table>
        <thead>
            <tr>
		<th>Event</th>
		<th>Day</th>
		<th>Time</th>
	    </tr>
        </thead>
	<tbody>
	    {% for event in events %}
	    <tr>
		<td>{{ event.name }}</td>
		<td>{{ event.day }}</td>
		<td>{{ event.time }}</td>
	    </tr>
	    {% endfor %}
	</tbody>
    </table>
{% endblock %}
