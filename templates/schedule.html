{% extends "layout.html" %}

{% block title %}Schedule - Athens Skating Club{% endblock %}

{% block content %}
    <h2>Upcoming Events</h2>
    <table>
        <thead>
            <tr>
		<th>Event</th>
		<th>Day</th>
		<th>Time</th>
	    </tr>
        </thead>
	<tbody>
	    {% for event in events %}
	    <tr>
		<td>{{ event.name }}</td>
		<td>{{ event.day }}</td>
		<td>{{ event.time }}</td>
	    </tr>
	    {% endfor %}
        </tbody>
    </table>

    <div class="calendar">
        <div class="calendar-header">
            <button id="prevMonth">←</button>
            <h2 id="monthLabel"></h2>
            <button id="nextMonth">→</button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>
{% endblock %}
